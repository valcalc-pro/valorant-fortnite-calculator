<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DDLCLS8TS7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DDLCLS8TS7');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    
    <title>Valorant Inventory Calculator | ValCalc Pro</title>
    <meta name="description" content="Calculate the market value of your Valorant account instantly. Professional skin and rank valuation.">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h1>VALORANT INVENTORY CALCULATOR</h1>
    <p>Professional Valuation Tool for Agents</p>
</div>

<div class="container">
    <div id="valorant-calc">
        <h2 class="section-title">Account Details</h2>
        <div class="input-grid">
            <div>
                <label>Account Level</label>
                <input id="level" type="number" min="0" value="0">
            </div>
            <div>
                <label>Competitive Rank</label>
                <select id="rank" onchange="updateRankColor()">
                    <option value="1">Unranked</option>
                    <option value="1.02">Iron</option>
                    <option value="1.08">Bronze</option>
                    <option value="1.15">Silver</option>
                    <option value="1.25">Gold</option>
                    <option value="1.40">Platinum</option>
                    <option value="1.65">Diamond</option>
                    <option value="2.10">Ascendant</option>
                    <option value="2.80">Immortal</option>
                    <option value="4.50">Radiant</option>
                </select>
            </div>
        </div>

        <div class="input-grid">
            <div><label>Agents Unlocked</label><input id="agents" type="number" value="0"></div>
            <div><label>VP Balance</label><input id="vp" type="number" value="0"></div>
        </div>

        <h2 class="section-title">Weapon Skin Inventory</h2>
        <div class="skin-grid">
            <div><label>Select Edition</label><input id="select" type="number" value="0"></div>
            <div><label>Deluxe Edition</label><input id="deluxe" type="number" value="0"></div>
            <div><label>Premium Edition</label><input id="premium" type="number" value="0"></div>
            <div><label>Exclusive Edition</label><input id="exclusive" type="number" value="0"></div>
            <div><label>Ultra Edition</label><input id="ultra" type="number" value="0"></div>
            <div><label>Battle Pass Skins</label><input id="bp" type="number" value="0"></div>
        </div>
        
        <h3>Rare Collectibles</h3>
        <div class="checkbox-group">
            <label><input type="checkbox" value="50" class="val-rare"> Riot Gun Buddy</label>
            <label><input type="checkbox" value="40" class="val-rare"> Arcane Sheriff</label>
            <label><input type="checkbox" value="35" class="val-rare"> Champions 2021 Vandal</label>
            <label><input type="checkbox" value="35" class="val-rare"> Champions 2022 Phantom</label>
        </div>
    </div>

    <label>Account Region</label>
    <select id="region">
        <option value="1">Global / Europe / NA (1.0x)</option>
        <option value="0.75">Turkey / Brazil / Asia (0.75x)</option>
    </select>

    <button onclick="calculate()" class="calc-btn">CALCULATE VALUE</button>

    <div id="results-area">
        <h2 id="result-label">Estimated Market Value:</h2>
        <h1 id="total-val">0.00 €</h1>
        <div class="sell-methods">
            <span id="quick-sell">Quick Sell: 0.00 €</span>
            <span class="divider">|</span>
            <span id="normal-sell">Normal Sell: 0.00 €</span>
        </div>
    </div>

    <div class="affiliate-box">
        <a href="https://www.eldorado.gg/" target="_blank" class="eldorado-btn">Check Prices on Eldorado.gg</a>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
